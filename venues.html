    <!-- Scripts -->
    <script src="firebase-config.js"></script>
    <script src="user-management.js"></script>
    <script src="venue-system.js"></script>
    <script src="mobile-script-fixes.js"></script>
    <script src="pwa-registration.js" defer></script>
    
    <script>
        // Initialize venues page - FIXED VERSION
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Venues page loaded');
            
            // Wait for venue-system.js to load
            function checkVenueSystem() {
                if (typeof initializeVenueSystem === 'function') {
                    console.log('venue-system.js loaded successfully');
                    initializeVenueSystem();
                    setupEventListeners();
                } else {
                    console.log('Waiting for venue-system.js...');
                    setTimeout(checkVenueSystem, 100);
                }
            }
            
            checkVenueSystem();
        });
        
        function setupEventListeners() {
            // Search and filter listeners
            const venueSearch = document.getElementById('venueSearch');
            const typeFilter = document.getElementById('typeFilter');
            const distanceFilter = document.getElementById('distanceFilter');
            
            if (venueSearch) venueSearch.addEventListener('input', filterVenues);
            if (typeFilter) typeFilter.addEventListener('change', filterVenues);
            if (distanceFilter) distanceFilter.addEventListener('change', filterVenues);
            
            // View toggle listeners
            const gridView = document.getElementById('gridView');
            const mapView = document.getElementById('mapView');
            
            if (gridView) gridView.addEventListener('click', () => switchView('grid'));
            if (mapView) mapView.addEventListener('click', () => switchView('map'));
            
            // Add venue form listener
            const addVenueForm = document.getElementById('addVenueForm');
            if (addVenueForm) addVenueForm.addEventListener('submit', handleAddVenue);
            
            // Modal close listener
            const addVenueModal = document.getElementById('addVenueModal');
            if (addVenueModal) {
                addVenueModal.addEventListener('click', function(event) {
                    if (event.target === this) {
                        closeAddVenueModal();
                    }
                });
            }
        }
        
        function switchView(view) {
            const gridViewBtn = document.getElementById('gridView');
            const mapViewBtn = document.getElementById('mapView');
            const venuesGrid = document.getElementById('venuesGrid');
            const venuesMap = document.getElementById('venuesMap');
            
            if (view === 'grid') {
                if (gridViewBtn) gridViewBtn.classList.add('active');
                if (mapViewBtn) mapViewBtn.classList.remove('active');
                if (venuesGrid) venuesGrid.style.display = 'grid';
                if (venuesMap) venuesMap.style.display = 'none';
            } else {
                if (mapViewBtn) mapViewBtn.classList.add('active');
                if (gridViewBtn) gridViewBtn.classList.remove('active');
                if (venuesGrid) venuesGrid.style.display = 'none';
                if (venuesMap) venuesMap.style.display = 'flex';
            }
        }
        
        function showAddVenueModal() {
            const modal = document.getElementById('addVenueModal');
            if (modal) {
                modal.classList.add('show');
                
                // Get current location for address
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(function(position) {
                        console.log('Current location:', position.coords);
                        // TODO: Reverse geocode to get address
                    });
                }
            }
        }
        
        function handleAddVenue(event) {
            event.preventDefault();
            
            if (typeof addVenue === 'function') {
                addVenue();
            } else {
                console.error('addVenue function not available');
                showToast('Error: Venue system not loaded', 'error');
            }
        }
        
        // Make functions globally available
        window.showAddVenueModal = showAddVenueModal;
        window.handleAddVenue = handleAddVenue;
        window.switchView = switchView;
    </script>
