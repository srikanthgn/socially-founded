<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Completing LinkedIn Sign In - SociallyFounded</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        .loading-container {
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 1rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #f0f0f0;
            border-top: 3px solid #0077b5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 2rem;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        h2 {
            color: #003554;
            margin-bottom: 1rem;
        }
        
        .error {
            color: #d32f2f;
            margin-top: 1rem;
            padding: 1rem;
            background: #ffebee;
            border-radius: 0.5rem;
            display: none;
        }
        
        .retry-btn {
            margin-top: 1rem;
            padding: 0.75rem 2rem;
            background: #003554;
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            cursor: pointer;
            display: none;
        }
        
        .retry-btn:hover {
            background: #002544;
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="spinner"></div>
        <h2>Completing LinkedIn Sign In</h2>
        <p>Please wait while we authenticate your account...</p>
        
        <div class="error" id="errorMessage"></div>
        <button class="retry-btn" id="retryBtn" onclick="window.location.href='/'">
            Return to Home
        </button>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        // Handle LinkedIn OAuth callback
        async function handleLinkedInCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const state = urlParams.get('state');
            const error = urlParams.get('error');
            
            // Check for errors from LinkedIn
            if (error) {
                showError(`LinkedIn authentication failed: ${error}`);
                return;
            }
            
            // Verify state for CSRF protection
            const savedState = sessionStorage.getItem('linkedin_oauth_state');
            if (!state || state !== savedState) {
                showError('Invalid authentication state. Please try again.');
                return;
            }
            
            // Clear the saved state
            sessionStorage.removeItem('linkedin_oauth_state');
            
            if (!code) {
                showError('No authorization code received. Please try again.');
                return;
            }
            
            try {
                // Since LinkedIn requires server-side token exchange,
                // we'll use a Firebase Cloud Function to handle this
                const response = await fetch('/api/auth/linkedin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        code,
                        redirectUri: window.location.origin + '/linkedin-callback.html'
                    })
                });
                
                if (!response.ok) {
                    throw new Error('Failed to authenticate with LinkedIn');
                }
                
                const data = await response.json();
                
                // Sign in to Firebase with the custom token
                await firebase.auth().signInWithCustomToken(data.customToken);
                
                // Create/update user profile with LinkedIn data
                const user = firebase.auth().currentUser;
                if (user && data.profile) {
                    const userRef = db.collection('users').doc(user.uid);
                    const profile = {
                        uid: user.uid,
                        email: data.profile.email || user.email,
                        displayName: data.profile.displayName || user.displayName,
                        photoURL: data.profile.photoURL || user.photoURL,
                        linkedinId: data.profile.linkedinId,
                        providerId: 'linkedin.com',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    
                    // Check if user exists
                    const doc = await userRef.get();
                    if (!doc.exists) {
                        // Create new user with passport
                        await userRef.set({
                            profile,
                            passport: {
                                id: generatePassportId(),
                                level: 1,
                                experience: 0,
                                totalCheckIns: 0,
                                currentStreak: 0,
                                longestStreak: 0,
                                lastCheckIn: null,
                                achievements: ['founding_member']
                            }
                        });
                    } else {
                        // Update existing profile
                        await userRef.update({ profile });
                    }
                }
                
                // Redirect to passport page
                window.location.href = '/passport.html';
                
            } catch (error) {
                console.error('LinkedIn callback error:', error);
                showError(error.message || 'Failed to complete LinkedIn sign in');
            }
        }
        
        function generatePassportId() {
            const timestamp = Date.now().toString(36);
            const random = Math.random().toString(36).substr(2, 5);
            return `SF${timestamp}${random}`.toUpperCase();
        }
        
        function showError(message) {
            document.querySelector('.spinner').style.display = 'none';
            document.querySelector('h2').textContent = 'Authentication Failed';
            document.querySelector('p').style.display = 'none';
            
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
            
            document.getElementById('retryBtn').style.display = 'inline-block';
        }
        
        // Execute on page load
        handleLinkedInCallback();
    </script>
</body>
</html>
